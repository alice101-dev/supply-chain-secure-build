# Consumer deployment. With the Kyverno policy enforced, this only schedules
# because the image is signed by this repo's CI — swap the image for an
# unsigned one and admission rejects it.
apiVersion: v1
kind: Namespace
metadata:
  name: backend
  labels:
    pod-security.kubernetes.io/enforce: restricted
    pod-security.kubernetes.io/warn: restricted
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-api
  namespace: backend
  labels:
    app: backend-api
  annotations:
    checkov.io/skip1: CKV_K8S_43=Kyverno mutateDigest rewrites the tag to the verified digest at admission
    checkov.io/skip2: CKV_K8S_14=Deliberate — the tag is only a pointer; Kyverno resolves and pins the verified digest
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend-api
  template:
    metadata:
      labels:
        app: backend-api
    spec:
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 30 # preStop none; app drains within SHUTDOWN_TIMEOUT (10s)
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532 # distroless nonroot
        runAsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: backend-api
          image: ghcr.io/alice101-dev/supply-chain-secure-build:latest # digest pinned by Kyverno at admission
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: SHUTDOWN_TIMEOUT
              value: "10s"
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
          resources:
            requests:
              cpu: "50m"
              memory: "32Mi"
            limits:
              cpu: "200m"
              memory: "64Mi"
          startupProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 2
            failureThreshold: 15
          readinessProbe:
            httpGet:
              path: /readyz # flips to 503 during graceful shutdown => traffic drains first
              port: http
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 15
---
# Zero-trust default: only same-namespace pods may reach the API; no egress
# at all (it calls nothing).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: backend-api
  namespace: backend
spec:
  podSelector:
    matchLabels:
      app: backend-api
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector: {}
      ports:
        - port: 8080
          protocol: TCP
