name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

env:
  IMAGE: ghcr.io/${{ github.repository }}

jobs:
  # === Build → SBOM → vulnerability gate → publish → sign → attest → verify ===
  supply-chain:
    name: Build, scan, sign & attest
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # push image to GHCR
      id-token: write # keyless Cosign signing via GitHub OIDC
      attestations: write # SLSA build provenance
    steps:
      - uses: actions/checkout@v7

      - uses: docker/setup-buildx-action@v4

      # 1. Build locally — nothing is published until every gate passes.
      - name: Build image
        uses: docker/build-push-action@v7
        with:
          context: .
          load: true
          tags: ${{ env.IMAGE }}:ci

      # 2. Vulnerability gate: CRITICAL/HIGH with a fix available => fail here,
      #    BEFORE the image ever reaches a registry.
      - name: Vulnerability gate (Trivy)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.IMAGE }}:ci
          exit-code: "1"
          severity: CRITICAL,HIGH
          ignore-unfixed: true

      # 3. SBOM: a complete inventory of what's inside the image (SPDX).
      - name: Generate SBOM (Syft)
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.IMAGE }}:ci
          format: spdx-json
          output-file: sbom.spdx.json
          artifact-name: sbom.spdx.json

      # --- Publish + sign only on main; PRs stop after the gates above. ---
      - name: Login to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Push image
        if: github.event_name == 'push'
        id: push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:sha-${{ github.sha }}
          build-args: |
            VERSION=sha-${{ github.sha }}
            COMMIT=${{ github.sha }}

      - name: Install Cosign
        if: github.event_name == 'push'
        uses: sigstore/cosign-installer@v4.1.2

      # 4. Keyless signing: no key to store, rotate, or leak. GitHub's OIDC
      #    token proves WHICH repo+workflow built the image; Fulcio issues a
      #    short-lived cert; the signature lands in the Rekor transparency log.
      - name: Sign image (Cosign keyless)
        if: github.event_name == 'push'
        run: cosign sign --yes "${IMAGE}@${DIGEST}"
        env:
          DIGEST: ${{ steps.push.outputs.digest }}

      # 5. Attach the SBOM to the image as a signed attestation.
      - name: Attest SBOM
        if: github.event_name == 'push'
        run: cosign attest --yes --type spdxjson --predicate sbom.spdx.json "${IMAGE}@${DIGEST}"
        env:
          DIGEST: ${{ steps.push.outputs.digest }}

      # 6. SLSA build provenance: a signed statement of HOW the image was
      #    built (repo, commit, workflow, runner), pushed to the registry.
      - name: Attest build provenance (SLSA)
        if: github.event_name == 'push'
        uses: actions/attest-build-provenance@v4
        with:
          subject-name: ${{ env.IMAGE }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

      # 7. Close the loop: verify exactly what a consumer (or Kyverno) would.
      - name: Verify signature
        if: github.event_name == 'push'
        run: |
          cosign verify \
            --certificate-identity-regexp "^https://github.com/${{ github.repository }}/\.github/workflows/.*" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            "${IMAGE}@${DIGEST}"
        env:
          DIGEST: ${{ steps.push.outputs.digest }}

  # === Static checks on the Dockerfile & K8s manifests ===
  checkov:
    name: IaC scan (Checkov)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Checkov
        run: pip install checkov

      - name: Run Checkov
        run: checkov -d . --framework dockerfile,kubernetes

  # === Secret scanning across full history ===
  gitleaks:
    name: Secret scanning (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0 # full history so Gitleaks scans every commit, not just HEAD

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ github.token }}

  # === SAST on the source itself — the shift-left end of the supply chain ===
  semgrep:
    name: SAST (Semgrep CE)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Semgrep
        run: pip install semgrep

      - name: Semgrep scan
        run: |
          semgrep scan \
            --config p/golang \
            --config p/gosec \
            --config p/cwe-top-25 \
            --error

  # === Unit tests & static analysis on the Go source ===
  go:
    name: Go build, vet & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version: stable
          check-latest: true

      - run: go build ./...
      - run: go vet ./...
      - run: go test ./...

  # === SCA on the source: dependency + stdlib vulns that the code actually calls ===
  govulncheck:
    name: SCA (govulncheck)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version: stable
          check-latest: true

      # Call-graph aware: only reports vulnerabilities in code paths this
      # service actually reaches — complements Trivy's inventory-level scan
      # of the final image.
      - name: Run govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

  # === Supply-chain risk on dependency changes (Socket) ===
  # Behavioral analysis of the dependencies' actual code (malware, install
  # scripts, obfuscation, typosquats, abandoned/deprecated packages) — the
  # class of attack CVE databases can't see on day zero. Complements
  # govulncheck/Trivy, which only match KNOWN vulnerabilities.
  #
  # Whether a finding blocks the PR is set in the Socket Security Policy
  # (dashboard), not here: alerts mapped to "error" fail this job, "warn"
  # only report. PR-only, since Socket comments on the pull request.
  socket:
    name: Supply chain risk (Socket)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Socket CLI
        run: pip install socketsecurity --upgrade

      - name: Socket scan
        run: socketcli --target-path "$GITHUB_WORKSPACE" --scm github --pr-number "${{ github.event.pull_request.number }}"
        env:
          SOCKET_SECURITY_API_KEY: ${{ secrets.SOCKET_SECURITY_API_KEY }}
          GH_API_TOKEN: ${{ github.token }}
