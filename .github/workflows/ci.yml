name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

env:
  IMAGE: ghcr.io/${{ github.repository }}

jobs:
  # === Build → SBOM → vulnerability gate → publish → sign → attest → verify ===
  supply-chain:
    name: Build, scan, sign & attest
    # Shift-left ordering: the image is not even BUILT until every source-level
    # gate has passed — a poisoned dependency, insecure pattern, or leaked
    # secret stops the pipeline before Docker runs, and a red govulncheck can
    # never race a green Trivy to the registry on a direct push to main.
    # Socket is deliberately not listed: it only runs on PRs, and a skipped
    # `needs` entry would skip this job entirely on main; its gate is enforced
    # at merge time via required status checks instead.
    needs: [go, govulncheck, semgrep, gitleaks, checkov]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # push image to GHCR
      id-token: write # keyless Cosign signing via GitHub OIDC
      attestations: write # SLSA build provenance
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      # 1. Build locally — nothing is published until every gate passes.
      - name: Build image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          load: true
          tags: ${{ env.IMAGE }}:ci

      # 2. Vulnerability gate: any CRITICAL/HIGH fails here, BEFORE the image
      #    reaches a registry — including vulns with no upstream fix yet. We keep
      #    ignore-unfixed set explicitly to false (not removed) so the policy is
      #    self-documenting: an unfixable CVE must be an explicit, time-boxed
      #    exception in .trivyignore that a reviewer signs off on, not a silent
      #    pass. trivy-action auto-loads .trivyignore from the repo root.
      - name: Vulnerability gate (Trivy)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ env.IMAGE }}:ci
          exit-code: "1"
          severity: CRITICAL,HIGH
          ignore-unfixed: false

      # 3. SBOM: a complete inventory of what's inside the image (SPDX).
      - name: Generate SBOM (Syft)
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          image: ${{ env.IMAGE }}:ci
          format: spdx-json
          output-file: sbom.spdx.json
          artifact-name: sbom.spdx.json

      # --- Publish + sign only on main; PRs stop after the gates above. ---
      - name: Login to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Push image
        if: github.event_name == 'push'
        id: push
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:sha-${{ github.sha }}
          build-args: |
            VERSION=sha-${{ github.sha }}
            COMMIT=${{ github.sha }}

      - name: Install Cosign
        if: github.event_name == 'push'
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      # 4. Keyless signing: no key to store, rotate, or leak. GitHub's OIDC
      #    token proves WHICH repo+workflow built the image; Fulcio issues a
      #    short-lived cert; the signature lands in the Rekor transparency log.
      - name: Sign image (Cosign keyless)
        if: github.event_name == 'push'
        run: cosign sign --yes "${IMAGE}@${DIGEST}"
        env:
          DIGEST: ${{ steps.push.outputs.digest }}

      # 5. Attach the SBOM to the image as a signed attestation.
      - name: Attest SBOM
        if: github.event_name == 'push'
        run: cosign attest --yes --type spdxjson --predicate sbom.spdx.json "${IMAGE}@${DIGEST}"
        env:
          DIGEST: ${{ steps.push.outputs.digest }}

      # 6. SLSA build provenance: a signed statement of HOW the image was
      #    built (repo, commit, workflow, runner), pushed to the registry.
      - name: Attest build provenance (SLSA)
        if: github.event_name == 'push'
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-name: ${{ env.IMAGE }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

      # 7. Close the loop: verify exactly what a consumer (or Kyverno) would.
      - name: Verify signature
        if: github.event_name == 'push'
        run: |
          cosign verify \
            --certificate-identity-regexp "^https://github.com/${{ github.repository }}/\.github/workflows/.*" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            "${IMAGE}@${DIGEST}"
        env:
          DIGEST: ${{ steps.push.outputs.digest }}

  # === Static checks on the Dockerfile & K8s manifests ===
  checkov:
    name: IaC scan (Checkov)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"

      - name: Install Checkov
        run: pip install checkov

      - name: Run Checkov
        run: checkov -d . --framework dockerfile,kubernetes

  # === Secret scanning across full history ===
  gitleaks:
    name: Secret scanning (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0 # full history so Gitleaks scans every commit, not just HEAD

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3.0.0
        env:
          GITHUB_TOKEN: ${{ github.token }}

  # === SAST on the source itself — the shift-left end of the supply chain ===
  semgrep:
    name: SAST (Semgrep CE)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"

      - name: Install Semgrep
        run: pip install semgrep

      - name: Semgrep scan
        run: |
          semgrep scan \
            --config p/golang \
            --config p/gosec \
            --config p/cwe-top-25 \
            --error

  # === Unit tests & static analysis on the Go source ===
  go:
    name: Go build, vet & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: stable
          check-latest: true

      - run: go build ./...
      - run: go vet ./...
      - run: go test ./...

  # === SCA on the source: dependency + stdlib vulns that the code actually calls ===
  govulncheck:
    name: SCA (govulncheck)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: stable
          check-latest: true

      # Call-graph aware: only reports vulnerabilities in code paths this
      # service actually reaches — complements Trivy's inventory-level scan
      # of the final image.
      - name: Run govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

  # === Supply-chain risk on dependency changes (Socket) ===
  # Behavioral analysis of the dependencies' actual code (malware, install
  # scripts, obfuscation, typosquats, abandoned/deprecated packages) — the
  # class of attack CVE databases can't see on day zero. Complements
  # govulncheck/Trivy, which only match KNOWN vulnerabilities.
  #
  # Whether a finding blocks the PR is set in the Socket Security Policy
  # (dashboard), not here: alerts mapped to "error" fail this job, "warn"
  # only report. PR-only, since Socket comments on the pull request.
  socket:
    name: Supply chain risk (Socket)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      pull-requests: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"

      - name: Install Socket CLI
        run: pip install socketsecurity --upgrade

      - name: Socket scan
        run: socketcli --target-path "$GITHUB_WORKSPACE" --scm github --pr-number "${{ github.event.pull_request.number }}"
        env:
          SOCKET_SECURITY_API_KEY: ${{ secrets.SOCKET_SECURITY_API_KEY }}
          GH_API_TOKEN: ${{ github.token }}
